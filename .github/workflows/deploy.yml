name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_STOREFRONT: ghcr.io/markwahba-git/ecommerce-platform-vee-storefront
  IMAGE_ADMIN: ghcr.io/markwahba-git/ecommerce-platform-vee-admin
  IMAGE_WORKER: ghcr.io/markwahba-git/ecommerce-platform-vee-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build all three images in parallel
      - name: Build and push storefront
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/storefront/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_STOREFRONT }}:latest
            ${{ env.IMAGE_STOREFRONT }}:${{ github.sha }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront

      - name: Build and push admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_ADMIN }}:latest
            ${{ env.IMAGE_ADMIN }}:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/projects/ecommerce-platform-vee
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            docker image prune -f
